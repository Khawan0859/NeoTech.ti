<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoTech - Orçamento</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0d1117; color: #ffffff; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #161b22; padding: 20px; border-radius: 10px; box-shadow: 0 0 15px rgba(0, 150, 255, 0.5); text-align: center; }
        input, button { margin: 8px 0; padding: 12px; width: 95%; border-radius: 8px; border: none; }
        input { background: #21262d; color: #fff; }
        button { background: #008cff; color: #fff; cursor: pointer; font-weight: bold; }
        button:hover { background: #005fcc; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #30363d; padding: 12px; text-align: center; }
        th { background-color: #008cff; }
        .total { font-size: 1.5em; font-weight: bold; text-align: center; margin-top: 15px; }
        .remove-btn { background: red; color: white; padding: 8px; border: none; cursor: pointer; border-radius: 5px; }
        .discount { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>NeoTech - Criar Orçamento</h2>
        <input type="text" id="service" placeholder="Serviço">
        <input type="number" id="price" placeholder="Valor (R$)">
        <button onclick="addService()">Adicionar Serviço</button>
        
        <h3>Adicionar Cupom</h3>
        <input type="text" id="newCouponCode" placeholder="Código do cupom">
        <input type="number" id="newCouponValue" placeholder="Desconto (%)">
        <button onclick="addCoupon()">Cadastrar Cupom</button>
        
        <table>
            <thead>
                <tr>
                    <th>Serviço</th>
                    <th>Valor (R$)</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="serviceList"></tbody>
        </table>
        
        <h3 class="total">Total: R$ <span id="totalPrice">0.00</span></h3>
        
        <h3>Aplicar Cupom</h3>
        <input type="text" id="coupon" placeholder="Digite o código do cupom">
        <button onclick="applyCoupon()">Aplicar</button>
        <p id="discountText" class="discount"></p>
    </div>
    
    <script>
        let total = 0;
        let discountApplied = false;
        let coupons = {};
        
        function addService() {
            let service = document.getElementById("service").value;
            let price = parseFloat(document.getElementById("price").value);
            
            if (service && !isNaN(price)) {
                let table = document.getElementById("serviceList");
                let row = table.insertRow();
                row.insertCell(0).innerText = service;
                row.insertCell(1).innerText = `R$ ${price.toFixed(2)}`;
                let removeBtn = document.createElement("button");
                removeBtn.innerText = "Remover";
                removeBtn.classList.add("remove-btn");
                removeBtn.onclick = function() { removeService(row, price); };
                row.insertCell(2).appendChild(removeBtn);
                
                total += price;
                updateTotal();
            }
        }
        
        function removeService(row, price) {
            row.remove();
            total -= price;
            updateTotal();
        }
        
        function updateTotal() {
            let discount = discountApplied ? total * discountApplied : 0;
            document.getElementById("totalPrice").innerText = (total - discount).toFixed(2);
        }
        
        function applyCoupon() {
            let couponCode = document.getElementById("coupon").value.toUpperCase();
            if (coupons[couponCode]) {
                discountApplied = coupons[couponCode] / 100;
                updateTotal();
                document.getElementById("discountText").innerText = `Cupom aplicado! Desconto de ${coupons[couponCode]}%`;
            } else {
                document.getElementById("discountText").innerText = "Cupom inválido!";
            }
        }
        
        function addCoupon() {
            let newCouponCode = document.getElementById("newCouponCode").value.toUpperCase();
            let newCouponValue = parseFloat(document.getElementById("newCouponValue").value);
            
            if (newCouponCode && !isNaN(newCouponValue) && newCouponValue > 0) {
                coupons[newCouponCode] = newCouponValue;
                alert(`Cupom ${newCouponCode} cadastrado com ${newCouponValue}% de desconto!`);
            } else {
                alert("Insira um código válido e um valor de desconto positivo.");
            }
        }
    </script>
</body>
</html>
